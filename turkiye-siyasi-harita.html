<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Türkiye Siyasi Haritası - İl Bazlı</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  header { text-align: center; padding: 24px 16px 8px; }
  header h1 {
    font-size: 1.6rem; font-weight: 700;
    background: linear-gradient(135deg, #e11d48, #f59e0b);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 4px;
  }
  header p { font-size: 0.85rem; color: #94a3b8; }
  #map-container { width: 100%; max-width: 1100px; position: relative; flex: 1; }
  svg { width: 100%; height: auto; }
  .province {
    stroke: #1e293b; stroke-width: 0.5; cursor: pointer;
    transition: filter 0.15s, stroke-width 0.15s;
  }
  .province:hover { filter: brightness(1.3) saturate(1.2); stroke: #f8fafc; stroke-width: 1.5; }
  .province.selected { stroke: #fbbf24; stroke-width: 2; filter: brightness(1.4); }
  #tooltip {
    position: fixed; pointer-events: none;
    background: rgba(15, 23, 42, 0.95); border: 1px solid #334155;
    border-radius: 8px; padding: 10px 14px; font-size: 0.85rem;
    display: none; z-index: 100; backdrop-filter: blur(8px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4); min-width: 160px;
  }
  #tooltip .tt-name { font-weight: 700; font-size: 1rem; color: #f8fafc; margin-bottom: 4px; }
  #tooltip .tt-detail { color: #94a3b8; font-size: 0.8rem; }
  #info-panel {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(15, 23, 42, 0.95); border: 1px solid #334155;
    border-radius: 12px; padding: 14px 24px; display: none;
    backdrop-filter: blur(8px); box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    text-align: center; z-index: 90; max-width: 90vw;
  }
  #info-panel .city-name { font-size: 1.3rem; font-weight: 700; color: #fbbf24; }
  #info-panel .city-details { font-size: 0.85rem; color: #94a3b8; margin-top: 4px; }
  #legend { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; padding: 8px 16px 16px; max-width: 1100px; }
  .legend-item {
    display: flex; align-items: center; gap: 5px; font-size: 0.72rem;
    color: #94a3b8; cursor: pointer; padding: 3px 8px; border-radius: 4px;
    transition: background 0.15s;
  }
  .legend-item:hover { background: rgba(255,255,255,0.05); }
  .legend-swatch { width: 12px; height: 12px; border-radius: 3px; border: 1px solid rgba(255,255,255,0.1); }
  #search-box { margin: 8px 0; position: relative; width: 280px; }
  #search-box input {
    width: 100%; padding: 8px 12px 8px 36px; background: #1e293b;
    border: 1px solid #334155; border-radius: 8px; color: #f8fafc;
    font-size: 0.85rem; outline: none; transition: border-color 0.2s;
  }
  #search-box input:focus { border-color: #e11d48; }
  #search-box input::placeholder { color: #475569; }
  #search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #475569; }
  #loading {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #0f172a; z-index: 999; flex-direction: column; gap: 16px;
  }
  .spinner {
    width: 40px; height: 40px; border: 3px solid #1e293b; border-top-color: #e11d48;
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><span style="color:#94a3b8;font-size:0.9rem;">Harita yükleniyor...</span></div>

<header>
  <h1>Türkiye Siyasi Haritası</h1>
  <p>81 İl — Tıklayın, yakınlaştırın veya arayın</p>
</header>

<div id="search-box">
  <svg id="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
  </svg>
  <input type="text" id="search" placeholder="İl ara..." autocomplete="off">
</div>

<div id="map-container"></div>
<div id="legend"></div>
<div id="tooltip"><div class="tt-name"></div><div class="tt-detail" id="tt-plate"></div><div class="tt-detail" id="tt-region"></div></div>
<div id="info-panel"><div class="city-name" id="panel-name"></div><div class="city-details" id="panel-details"></div></div>

<script>
const regions = {
  "Marmara":     { color: "#3b82f6", cities: ["İstanbul","Tekirdağ","Edirne","Kırklareli","Çanakkale","Balıkesir","Bursa","Yalova","Kocaeli","Sakarya","Bilecik"] },
  "Ege":         { color: "#8b5cf6", cities: ["İzmir","Aydın","Denizli","Muğla","Manisa","Afyonkarahisar","Kütahya","Uşak"] },
  "Akdeniz":     { color: "#f59e0b", cities: ["Antalya","Isparta","Burdur","Mersin","Adana","Hatay","Osmaniye","Kahramanmaraş"] },
  "İç Anadolu":  { color: "#ef4444", cities: ["Ankara","Konya","Aksaray","Kırşehir","Kırıkkale","Çankırı","Eskişehir","Karaman","Nevşehir","Niğde","Sivas","Kayseri","Yozgat"] },
  "Karadeniz":   { color: "#10b981", cities: ["Bolu","Düzce","Zonguldak","Bartın","Karabük","Kastamonu","Çorum","Sinop","Samsun","Amasya","Tokat","Ordu","Giresun","Gümüşhane","Trabzon","Rize","Artvin","Bayburt"] },
  "Doğu Anadolu":{ color: "#ec4899", cities: ["Erzurum","Erzincan","Ağrı","Kars","Ardahan","Iğdır","Malatya","Elazığ","Bingöl","Tunceli","Muş","Bitlis","Van","Hakkari"] },
  "G.Doğu Anadolu":{ color: "#f97316", cities: ["Gaziantep","Adıyaman","Kilis","Şanlıurfa","Diyarbakır","Mardin","Batman","Şırnak","Siirt"] }
};

const plateMap = {
  "Adana":1,"Adıyaman":2,"Afyonkarahisar":3,"Ağrı":4,"Amasya":5,"Ankara":6,"Antalya":7,
  "Artvin":8,"Aydın":9,"Balıkesir":10,"Bilecik":11,"Bingöl":12,"Bitlis":13,"Bolu":14,
  "Burdur":15,"Bursa":16,"Çanakkale":17,"Çankırı":18,"Çorum":19,"Denizli":20,"Diyarbakır":21,
  "Edirne":22,"Elazığ":23,"Erzincan":24,"Erzurum":25,"Eskişehir":26,"Gaziantep":27,
  "Giresun":28,"Gümüşhane":29,"Hakkari":30,"Hatay":31,"Isparta":32,"Mersin":33,"İstanbul":34,
  "İzmir":35,"Kars":36,"Kastamonu":37,"Kayseri":38,"Kırklareli":39,"Kırşehir":40,
  "Kocaeli":41,"Konya":42,"Kütahya":43,"Malatya":44,"Manisa":45,"Kahramanmaraş":46,
  "Mardin":47,"Muğla":48,"Muş":49,"Nevşehir":50,"Niğde":51,"Ordu":52,"Rize":53,
  "Sakarya":54,"Samsun":55,"Siirt":56,"Sinop":57,"Sivas":58,"Tekirdağ":59,"Tokat":60,
  "Trabzon":61,"Tunceli":62,"Şanlıurfa":63,"Uşak":64,"Van":65,"Yozgat":66,"Zonguldak":67,
  "Aksaray":68,"Bayburt":69,"Karaman":70,"Kırıkkale":71,"Batman":72,"Şırnak":73,
  "Bartın":74,"Ardahan":75,"Iğdır":76,"Yalova":77,"Karabük":78,"Kilis":79,"Osmaniye":80,
  "Düzce":81
};

function getRegion(name) {
  for (const [r, d] of Object.entries(regions)) {
    if (d.cities.includes(name)) return { name: r, color: d.color };
  }
  return { name: "Bilinmiyor", color: "#475569" };
}

function formatPlate(p) { return p < 10 ? "0" + p : String(p); }

const geoUrl = "https://raw.githubusercontent.com/cihadturhan/tr-geojson/master/geo/tr-cities-utf8.json";

async function init() {
  let geo;
  try {
    const res = await fetch(geoUrl);
    geo = await res.json();
  } catch (e) {
    const ld = document.getElementById("loading");
    ld.textContent = "";
    const errMsg = document.createElement("span");
    errMsg.style.cssText = "color:#ef4444";
    errMsg.textContent = "Harita verisi yüklenemedi. Lütfen internet bağlantınızı kontrol edin.";
    ld.appendChild(errMsg);
    return;
  }

  document.getElementById("loading").style.display = "none";

  const width = 960, height = 500;
  const svg = d3.select("#map-container")
    .append("svg")
    .attr("viewBox", "0 0 " + width + " " + height)
    .attr("preserveAspectRatio", "xMidYMid meet");

  svg.append("rect").attr("width", width).attr("height", height).attr("fill", "#0f172a");

  const projection = d3.geoMercator().center([35.5, 39.0]).scale(2400).translate([width / 2, height / 2]);
  const path = d3.geoPath().projection(projection);

  const tooltipEl = document.getElementById("tooltip");
  const ttName = tooltipEl.querySelector(".tt-name");
  const ttPlate = document.getElementById("tt-plate");
  const ttRegion = document.getElementById("tt-region");
  const infoPanel = document.getElementById("info-panel");
  const panelName = document.getElementById("panel-name");
  const panelDetails = document.getElementById("panel-details");

  const g = svg.append("g");

  function getName(d) { return d.properties.name || d.properties.Name || d.properties.NAME || ""; }

  g.selectAll("path")
    .data(geo.features)
    .enter()
    .append("path")
    .attr("d", path)
    .attr("class", "province")
    .attr("fill", d => getRegion(getName(d)).color)
    .attr("data-name", d => getName(d))
    .on("mouseover", function(event, d) {
      const name = getName(d);
      const reg = getRegion(name);
      const plate = plateMap[name] || 0;
      ttName.textContent = name;
      ttPlate.textContent = "Plaka: " + formatPlate(plate);
      ttRegion.textContent = "Bölge: " + reg.name;
      tooltipEl.style.display = "block";
    })
    .on("mousemove", function(event) {
      const x = Math.min(event.clientX + 14, window.innerWidth - 200);
      const y = Math.max(event.clientY - 14, 10);
      tooltipEl.style.left = x + "px";
      tooltipEl.style.top = y + "px";
    })
    .on("mouseout", function() { tooltipEl.style.display = "none"; })
    .on("click", function(event, d) {
      event.stopPropagation();
      const name = getName(d);
      const reg = getRegion(name);
      const plate = plateMap[name] || 0;
      g.selectAll(".province").classed("selected", false);
      d3.select(this).classed("selected", true);
      panelName.textContent = name + " (" + formatPlate(plate) + ")";
      panelDetails.textContent = reg.name + " Bölgesi";
      infoPanel.style.display = "block";
    });

  // Province labels
  const bigCities = new Set(["İstanbul","Ankara","İzmir","Antalya","Konya","Bursa","Sivas","Erzurum"]);
  g.selectAll("text")
    .data(geo.features)
    .enter()
    .append("text")
    .attr("transform", d => { const c = path.centroid(d); return "translate(" + c[0] + "," + c[1] + ")"; })
    .attr("text-anchor", "middle")
    .attr("dy", "0.35em")
    .attr("fill", "#f8fafc")
    .attr("font-size", d => bigCities.has(getName(d)) ? "6px" : "4.5px")
    .attr("font-weight", "600")
    .attr("pointer-events", "none")
    .attr("opacity", 0.85)
    .text(d => getName(d));

  // Zoom
  const zoom = d3.zoom().scaleExtent([1, 8]).on("zoom", (event) => {
    g.attr("transform", event.transform);
    g.selectAll(".province").attr("stroke-width", 0.5 / event.transform.k);
  });
  svg.call(zoom);
  svg.on("dblclick.zoom", null);
  svg.on("dblclick", () => svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity));

  // Legend
  const legend = document.getElementById("legend");
  for (const [rName, data] of Object.entries(regions)) {
    const item = document.createElement("div");
    item.className = "legend-item";
    const swatch = document.createElement("div");
    swatch.className = "legend-swatch";
    swatch.style.background = data.color;
    item.appendChild(swatch);
    const label = document.createTextNode(rName + " (" + data.cities.length + ")");
    item.appendChild(label);
    item.addEventListener("click", () => {
      g.selectAll(".province").transition().duration(300)
        .attr("opacity", function() { return data.cities.includes(d3.select(this).attr("data-name")) ? 1 : 0.15; });
      setTimeout(() => { g.selectAll(".province").transition().duration(500).attr("opacity", 1); }, 2000);
    });
    legend.appendChild(item);
  }

  // Search
  document.getElementById("search").addEventListener("input", function() {
    const q = this.value.toLowerCase().replace(/i̇/g, "i");
    if (!q) { g.selectAll(".province").transition().duration(200).attr("opacity", 1); return; }
    g.selectAll(".province").transition().duration(200)
      .attr("opacity", function() {
        const n = (d3.select(this).attr("data-name") || "").toLowerCase().replace(/i̇/g, "i");
        return n.includes(q) ? 1 : 0.1;
      });
  });

  // Click background to deselect
  svg.on("click", function(event) {
    if (event.target.tagName === "rect") {
      g.selectAll(".province").classed("selected", false);
      infoPanel.style.display = "none";
    }
  });
}

init();
</script>
</body>
</html>
